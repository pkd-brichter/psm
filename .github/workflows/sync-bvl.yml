name: Sync BVL Data

on:
  # Auto-Sync deaktiviert (2026-06-20): Die BVL-Datenbank wird extern via
  # pflanzenschutz-db (GitHub Pages) gehostet und NICHT mehr in dieses Repo
  # committet — das vermeidet unbegrenztes Git-LFS-Wachstum (vorher ~2,3 GB).
  # Der Workflow ist nur noch manuell auslösbar; das Ergebnis wird als
  # herunterladbares Artefakt bereitgestellt, statt es zu committen.
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force complete rebuild of database"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/bvl-sync/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r tools/bvl-sync/requirements.txt

      - name: Fetch BVL data
        run: |
          cd tools/bvl-sync
          python scripts/fetch_bvl_data.py \
            --output-dir ../../public/data/bvl \
            --verbose
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}

      - name: Validate export
        run: |
          python tools/bvl-sync/scripts/validate_export.py \
            public/data/bvl/pflanzenschutz.sqlite

      - name: Remove raw sqlite (keep compressed only)
        run: |
          rm -f public/data/bvl/pflanzenschutz.sqlite public/data/bvl/pflanzenschutz.sqlite-*

      - name: Upload database as artifact (NICHT ins Repo committen)
        uses: actions/upload-artifact@v4
        with:
          name: bvl-database
          path: |
            public/data/bvl/manifest.json
            public/data/bvl/*.sqlite.br
            public/data/bvl/*.sqlite.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Summary
        run: |
          echo "## BVL Sync Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f public/data/bvl/pflanzenschutz.sqlite.br ]; then
            SIZE=$(du -h public/data/bvl/pflanzenschutz.sqlite.br | cut -f1)
            echo "- Database (br): $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f public/data/bvl/pflanzenschutz.sqlite.zip ]; then
            SIZEZIP=$(du -h public/data/bvl/pflanzenschutz.sqlite.zip | cut -f1)
            echo "- Database (zip): $SIZEZIP" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Bereitgestellt als Artefakt: **bvl-database** (nicht committet)" >> $GITHUB_STEP_SUMMARY
