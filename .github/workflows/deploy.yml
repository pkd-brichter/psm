name: Deploy to GitHub Pages

on:
  # Auto-Deploy deaktiviert (2026-06-21): GitHub Pages ist im Org-Repo noch
  # nicht eingerichtet und base="/" ist für eine Root-Domain gebaut. Erst
  # manuell auslösen, wenn Pages/Domain konfiguriert ist (sonst schlägt der
  # Deploy-Schritt bei jedem Push fehl).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify LFS files
        run: |
          echo "Checking LFS files..."
          git lfs ls-files
          echo ""
          echo "Verifying image sizes..."
          ls -la public/assets/img/ || echo "No public/assets/img/"
          ls -la src/assets/img/ || echo "No src/assets/img/"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Create .nojekyll file
        run: |
          if [ ! -d "dist" ]; then 
            echo "Error: dist directory not found"
            ls -la
            exit 1
          fi
          touch dist/.nojekyll
          echo "Created .nojekyll file in dist/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
